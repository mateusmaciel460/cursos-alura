<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alugames</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <!-- CONTEÚDO -->
    <main class="conteudo">
        <section class="conteudo__secao">
            <h1 class="conteudo__titulo">Total de jogos alugados: 0</h1>

            <div class="conteudo__grupo" id="conteudo-grupo">
                <div class="conteudo__camada" id="jogo-1">
                    <img src="images/monopoly.png" class="conteudo__camada-imagem"/>
                    <h2 class="conteudo__camada-titulo">Monopoly</h2>
                    <button href="#" id="conteudo-link" onclick="operar(1)" class="conteudo__camada-botao--azul">Alugar</a>
                </div>

                <div class="conteudo__camada" id="jogo-2">
                    <img src="images/ticket-to-ride.png"  class="conteudo__camada-imagem"/>
                    <h2 class="conteudo__camada-titulo">Ticket to Ride</h2>
                    <button href="#" id="conteudo-link" onclick="operar(2)" class="conteudo__camada-botao--azul">Alugar</a>
                </div>

                <div class="conteudo__camada" id="jogo-3">
                    <img src="images/takenoko.png"  class="conteudo__camada-imagem"/>
                    <h2 class="conteudo__camada-titulo">Takenoko</h2>
                    <button href="#" id="conteudo-link" onclick="operar(3)" class="conteudo__camada-botao--azul">Alugar</a>
                </div>
            </div>
        </section>
    </main>
    <!-- CONTEÚDO -->

    <!-- JAVASCRIPT -->
    <script src="js/script.js" defer></script>
    <!-- JAVASCRIPT -->
</body>
</html>
