<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho de Compras</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="shortcut icon" href="assets/icone-carrinho.svg" type="image/x-icon">
</head>
<body>
    <!-- CONTAINER -->
    <main class="container">
        <section class="container__section">
            <h1 class="container__title">Carrinho de <span class="container__span">compras</span></h1>

            <div class="container__layer">
                <label class="container__label">Produto</label>
                <select class="container__input container__input--select" id="produto">
                    <option value="Fone de ouvido - R$100">Fone de ouvido - R$100</option>
                    <option value="Celular - R$1400">Celular - R$1400</option>
                    <option value="Oculus - R$5000">Oculus - R$5000</option>
                </select>
            </div>

            <div class="container__layer">
                <label class="container__label">Qtde</label>
                <div class="container__layer--secondary">
                    <input type="number" class="container__input container__input--extra" id="quantidade" placeholder="100"/>
                    <button onclick="validarCampo()" class="container__button container__button--blue">Adicionar</button>
                    <button onclick="limpar()" class="container__button container__button--gray">Limpar</button>
                </div>
            </div>

            <div class="container__layer" id="texto-aviso"></div>
        </section>

        <section class="container__section">
            <img src="assets/carrinho-cinza.svg" class="container__image--uper"/>

            <div class="container__group">
                <img src="assets/icone-carrinho.svg" class="container__image"/>
                <h2 class="container__subtitle">Produtos no carrinho</h2>
            </div>

            <div class="container__group">
                <ul class="container__menu-list" id="lista-produtos"></ul>
            </div>

            <div class="container__group">
                <h2 class="container__subtitle--lower">
                    Total: <span class="container__span" id="valor-total">R$1400</span>
                </h2>
            </div>
        </section>
    </main>
    <!-- CONTAINER -->
    
    <!-- SCRIPT -->
    <script src="js/app.js" defer></script>
    <!-- SCRIPT -->
</body>
</html>
