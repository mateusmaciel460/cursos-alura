<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresso Online</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="shortcut icon" href="assets/Ingresso.svg" type="image/x-icon">
</head>
<body>
    <!-- CONTAINER -->
    <main class="container">
        <section class="container__section">
            <h1 class="container__title">Compre seu <span class="container__span">ingresso</span></h1>

            <div class="container__group container__group--uper">
                <div class="container__layer">
                    <label class="container__label">Escolha o tipo</label>
                    <select class="container__input" id="tipo-ingresso">
                        <option class="container__option" value="pista">Pista</option>
                        <option class="container__option" value="superior">Cadeira superior</option>
                        <option class="container__option" value="inferior">Cadeira inferior</option>
                    </select>
                </div>
                <div class="container__layer container__limit">
                    <label class="container__label">Qtd</label>
                    <input type="number" id="qtd" placeholder="00" class="container__input"/>
                </div>
                <div class="container__layer">
                    <button class="container__button" onclick="comprar()">Comprar</button>
                </div>
            </div>

            <div class="container__group container__group--lower">
                <div class="container__layer">
                    <h2 class="container__subtitle">Quantidade disponível</h2>
                    <p id="aviso"></p>
                </div>

                <div class="container__layer">
                    <ul class="container__menu-list">
                        <li class="container__menu-item">
                            Pista <span class="container__menu-span" id="qtd-pista">100</span>
                        </li>
                        <li class="container__menu-item">
                            Cadeira superior <span class="container__menu-span" id="qtd-superior">100</span>
                        </li>
                        <li class="container__menu-item">
                            Cadeira inferior <span class="container__menu-span" id="qtd-inferior">100</span>
                        </li>
                    </ul>
                </div>

                <div class="container__layer">
                    <img src="images/ingresso.png" class="container__image"/>
                </div>
            </div>
        </section>
    </main>
    <!-- CONTAINER -->

    <!-- SCRIPT -->
    <script src="js/app.js" defer></script>
    <!-- SCRIPT -->
</body>
</html>
