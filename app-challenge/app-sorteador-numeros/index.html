<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador de Números</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="shortcut icon" href="img/ia.png" type="image/x-icon">
</head>
<body>
    <!-- CONTAINER -->
    <main class="container">
        <section class="container__section">
            <h1 class="container__title">Sorteadorde Números</h1>

            <div class="container__group">
                <div class="container__layer">
                    <label class="container__label">Quantidade de números</label>
                    <input type="number" placeholder="00" id="quantidade" class="container__input"/>
                </div>

                <div class="container__layer">
                    <label class="container__label">Do número</label>
                    <input type="number" placeholder="00" id="de" class="container__input"/>
                </div>

                <div class="container__layer">
                    <label class="container__label">Até o número</label>
                    <input type="number" placeholder="00" id="ate" class="container__input"/>
                </div>
            </div>

            <div class="container__buttons">
                <button onclick="verificarCampo()" class="container__button" id="botao-sortear">Sortear</button>
                <button onclick="reiniciar()" class="container__button--disabled" id="botao-reiniciar">Reiniciar</button>
            </div>
        </section>

        <section class="container__section container__section--center">
            <img src="img/ia.png" class="container__image"/>
            <h2 class="container__subtitle">
                Números sorteados: <br/> <span class="container__span" id="resultado">nenhum até agora</span>
            </h2>
        </section>
    </main>
    <!-- CONTAINER -->

    <!-- SCRIPT -->
    <script src="js/app.js" defer></script>
    <!-- SCRIPT -->
</body>
</html>
