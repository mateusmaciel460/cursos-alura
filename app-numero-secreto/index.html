<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Número Secreto</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="shortcut icon" href="img/ia.png" type="image/x-icon">
</head>
<body>
    <!-- CONTAINER -->
    <main class="container">
        <section class="container__section">
            <h1 class="container__title">Jogo do Número secreto</h1>
            <p class="container__text">Escolha um número entre x e y</p>
            <input type="number" placeholder="Digite um número inteiro" class="container__input"/>

            <div class="container__buttons">
                <button onclick="verificarChute()" class="container__button">Chutar</button>
                <button onclick="reiniciarJogo()" id="reiniciar" class="container__button" disabled>Novo jogo</button>
            </div>
        </section>

        <section class="container__section container__section--center">
            <img src="img/ia.png" class="container__image"/>
        </section>
    </main>
    <!-- CONTAINER -->

    <!-- SCRIPT -->
    <script src="js/app.js" defer></script>
    <!-- SCRIPT -->
</body>
</html>
